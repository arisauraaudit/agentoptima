# AgentOptima Railway Configuration v2
[build]
builder = "DOCKERFILE"
dockerfilePath = "./Dockerfile"

[deploy]
numReplicas = 1
sleepTimeoutSeconds = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[variables]
PORT = "8000"
ENVIRONMENT = "production"
DEBUG = "false"
APP_MODULE = "api.main:app"
