# AgentOptima Railway Configuration
# Deploy command: docker build -t agentoptima . && docker push && Railway auto-deploys

[build]
builder = "DOCKERFILE"
dockerfilePath = "./Dockerfile"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
numReplicas = 1
sleepTimeoutSeconds = 10

[variables]
PORT = "8000"
ENVIRONMENT = "production"
DEBUG = "false"
