version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: agentoptima
      POSTGRES_PASSWORD: CHANGE_ME_SECURITY_1
      POSTGRES_DB: agentoptima
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentoptima"]
      interval: 10s
      timeout: 5s
      retries: 5

  # API Application
  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    env_file:
      - ../config/.env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # Research Pipeline (background worker)
  research-worker:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    command: ["python", "research/worker.py"]
    env_file:
      - ../config/.env
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
